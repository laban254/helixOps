version: "3.9"

name: helixops

services:
  # HelixOps Agent
  helixops:
    build: .
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      HELIX_PROMETHEUS_URL: http://prometheus:9090
      HELIX_LOKI_URL: http://loki:3100
      HELIX_GITHUB_API_URL: https://api.github.com
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      HELIX_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./config.yaml:/etc/helixops/config.yaml:ro
      - ./reports:/app/reports
    networks:
      - backend
      - observability
    ports:
      - "8080:8080"  

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: helixops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: helixops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixops -d helixops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - observability

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - observability

  # Loki
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  # Tempo
  tempo:
    image: grafana/tempo:latest
    restart: unless-stopped
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml:ro
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    networks:
      - observability

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    networks:
      - observability

  # Grafana
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000" 
    networks:
      - observability

  # Ollama
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend

networks:
  backend:
  observability:

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
  ollama_data:
  postgres_data: